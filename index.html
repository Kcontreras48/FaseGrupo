<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Parche Mundialista</title>
    
    <link rel="icon" type="image/png" href="icono.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        /* PALETA DE COLORES OSCUROS */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            padding: 20px; 
            margin: 0;
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-section img {
            width: 100px; 
            height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
        .header-section h1 {
            margin-top: 0;
            color: #ffffff;
        }
        
        h2, h3 { color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 8px; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }

        /* Formularios e Inputs */
        .codigo-input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #2c2c2c; 
            color: #ffffff;
            border: 1px solid #444; 
            border-radius: 5px; 
            text-transform: uppercase; 
        }
        .codigo-input::placeholder { color: #888888; }
        .codigo-input:focus { outline: none; border-color: #28a745; }
        
        /* Sección de Especiales (Grid) */
        .especiales-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .especial-card {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .especial-card label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #aaaaaa;
        }
        .especial-card input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #121212;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .especial-card input:focus { outline: none; border-color: #28a745; }

        /* Partidos */
        .partido-card { background: #252525; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
        .partido-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .equipo { text-align: center; width: 30%; font-weight: bold; font-size: 15px;}
        .equipo img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        
        .marcadores { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px;}
        input[type="number"] { width: 50px; padding: 10px; text-align: center; font-size: 16px; font-weight: bold; background: #121212; color: #ffffff; border: 1px solid #444; border-radius: 5px;}
        input[type="number"]:focus { outline: none; border-color: #28a745; }
        
        .info-fecha { text-align: center; font-size: 13px; color: #aaaaaa; margin-top: 10px; }
        
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 20px; transition: background 0.3s; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <img src="icono.png" alt="Logo Parche Mundialista">
        <h1>🏆 El Parche Mundialista 🏆</h1>
    </div>

    <div id="predicciones" class="content">
        <form action="https://formsubmit.co/keducacion48@gmail.com" method="POST">
            
            <label><strong>Tu Código Único:</strong></label>
            <input type="text" name="codigo_usuario" class="codigo-input" 
                   placeholder="Ej: A1234" 
                   pattern="[A-Za-z][0-9]{4}" 
                   title="Debe ser 1 letra seguida exactamente por 4 números (Ej: M1234)" 
                   required>
            
            <h3>Premios Especiales y Top 4</h3>
            <div class="especiales-grid">
                <div class="especial-card">
                    <label>🥇 Campeón</label>
                    <input type="text" name="Especial_Campeon" placeholder="País" required>
                </div>
                <div class="especial-card">
                    <label>🥈 Subcampeón</label>
                    <input type="text" name="Especial_Subcampeon" placeholder="País" required>
                </div>
                <div class="especial-card">
                    <label>🥉 Tercer Puesto</label>
                    <input type="text" name="Especial_Tercero" placeholder="País" required>
                </div>
                <div class="especial-card">
                    <label>🏅 Cuarto Puesto</label>
                    <input type="text" name="Especial_Cuarto" placeholder="País" required>
                </div>
                <div class="especial-card">
                    <label>👟 Bota de Oro</label>
                    <input type="text" name="Especial_BotaOro" placeholder="Nombre del jugador" required>
                </div>
                <div class="especial-card">
                    <label>⚽ Balón de Oro</label>
                    <input type="text" name="Especial_BalonOro" placeholder="Nombre del jugador" required>
                </div>
                <div class="especial-card">
                    <label>🧤 Guante de Oro</label>
                    <input type="text" name="Especial_GuanteOro" placeholder="Nombre del portero" required>
                </div>
            </div>

            <h3>Partidos de Fase de Grupos</h3>
            <div id="contenedor-partidos">
                <p style="text-align: center; color: #aaaaaa;">Cargando partidos desde el archivo CSV...</p>
            </div>

            <input type="hidden" name="_captcha" value="false">

            <button type="submit">Enviar Predicciones</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Lógica para leer el CSV de Partidos
        const archivoPartidosCSV = "fase_de_grupos_colombia_2026.csv"; 

        Papa.parse(archivoPartidosCSV, {
            download: true,
            header: true,
            complete: function(results) {
                const partidos = results.data;
                const contenedor = document.getElementById("contenedor-partidos");
                contenedor.innerHTML = ""; 

                partidos.forEach(function(partido) {
                    if (!partido["Equipo Local"]) return; 

                    const htmlPartido = `
                        <div class="partido-card">
                            <div class="partido-row">
                                <div class="equipo">
                                    <img src="${partido["Escudo Local (URL)"]}" alt="${partido["Equipo Local"]}">
                                    <br>
                                    ${partido["Equipo Local"]}
                                </div>
                                
                                <div class="marcadores">
                                    <input type="number" name="P_${partido["Partido"]}_Local" min="0" required>
                                    <span>-</span>
                                    <input type="number" name="P_${partido["Partido"]}_Visitante" min="0" required>
                                </div>
                                
                                <div class="equipo">
                                    <img src="${partido["Escudo Visitante (URL)"]}" alt="${partido["Equipo Visitante"]}">
                                    <br>
                                    ${partido["Equipo Visitante"]}
                                </div>
                            </div>
                            <div class="info-fecha">
                                📅 ${partido["Fecha (Colombia)"]} | ⏰ ${partido["Hora (Colombia)"]} | 🏟️ ${partido["Estadio"]}
                            </div>
                        </div>
                    `;
                    contenedor.innerHTML += htmlPartido;
                });
            },
            error: function() {
                document.getElementById("contenedor-partidos").innerHTML = "<p style='color:#ff4c4c; text-align:center;'>No se pudo cargar la lista de partidos.</p>";
            }
        });
    });
</script>

</body>
</html>
